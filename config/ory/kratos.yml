version: v25.4.0

dsn: postgres://ory:secret@postgres:5432/skillbox_kratos?sslmode=disable

serve:
  public:
    base_url: http://localhost:4435/
    cors:
      enabled: true
      allowed_origins:
        - http://localhost:3000
        - http://localhost:3947
      allowed_methods:
        - POST
        - GET
        - PUT
        - PATCH
        - DELETE
      allowed_headers:
        - Authorization
        - Content-Type
        - Cookie
        - X-Session-Token
      exposed_headers:
        - Set-Cookie
      allow_credentials: true
  admin:
    base_url: http://kratos:4434/

selfservice:
  default_browser_return_url: http://localhost:3947/
  allowed_return_urls:
    - http://localhost:3000
    - http://localhost:3947

  methods:
    password:
      enabled: true
    oidc:
      enabled: false # Enable when adding Entra ID / Google

  flows:
    login:
      ui_url: http://localhost:3947/auth/login
      lifespan: 10m
    registration:
      ui_url: http://localhost:3947/auth/registration
      lifespan: 10m
      after:
        password:
          hooks:
            - hook: session
    recovery:
      enabled: true
      ui_url: http://localhost:3947/auth/recovery
      lifespan: 10m
    verification:
      enabled: true
      ui_url: http://localhost:3947/auth/verification
      lifespan: 10m
      after:
        default_browser_return_url: http://localhost:3947/
    settings:
      ui_url: http://localhost:3947/auth/settings
    error:
      ui_url: http://localhost:3947/auth/error

oauth2_provider:
  url: http://hydra:4445

log:
  level: info
  format: json
  leak_sensitive_values: false

secrets:
  cookie:
    - skillbox-kratos-cookie-secret-change-in-prod
  cipher:
    - skillbox-kratos-cipher-secret!!!

hashers:
  argon2:
    parallelism: 1
    memory: 128MB
    iterations: 2
    salt_length: 16
    key_length: 16

identity:
  default_schema_id: default
  schemas:
    - id: default
      url: file:///etc/config/kratos/identity.schema.json

courier:
  smtp:
    connection_uri: smtp://mailpit:1025/?disable_starttls=true
