root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -o ./tmp/skillbox-server ./cmd/skillbox-server/"
bin = "./tmp/skillbox-server"
full_bin = "./tmp/skillbox-server"
include_ext = ["go", "tpl", "tmpl", "html"]
exclude_dir = ["tmp", "vendor", "deploy", "examples", "marketplace", "docs", "docs-site", "config", "landing-page", "sdks", "scripts", "artifacts", "bin", "todos", ".git"]
include_dir = []
exclude_file = []
delay = 1000
stop_on_error = true
log = "air.log"
send_interrupt = false
kill_delay = 500

[log]
time = false

[color]
main = "magenta"
watcher = "cyan"
build = "yellow"
runner = "green"

[misc]
clean_on_exit = true
