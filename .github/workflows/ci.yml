name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    if: github.event_name == 'pull_request'
    runs-on: netcup
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.10.1

  test:
    name: Test
    if: github.event_name == 'pull_request'
    runs-on: netcup
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Run tests
        run: go test -race -count=1 -coverprofile=coverage.out ./...
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.out
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  security:
    name: Security Scan
    if: github.event_name == 'pull_request'
    runs-on: netcup
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Run gosec
        uses: securego/gosec@master
        with:
          args: -exclude=G104,G107,G117,G204,G304,G122,G118 ./...

  build:
    name: Build
    if: github.event_name == 'push'
    runs-on: netcup
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build server
        run: CGO_ENABLED=0 go build -trimpath -o bin/skillbox-server ./cmd/skillbox-server
      - name: Build CLI
        run: CGO_ENABLED=0 go build -trimpath -o bin/skillbox ./cmd/skillbox

  docker:
    name: Docker Build
    if: github.event_name == 'push'
    runs-on: netcup
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -f deploy/docker/Dockerfile -t skillbox:test .
