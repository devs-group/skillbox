name: Lint & Test

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.10.1

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Run tests
        run: go test -count=1 -coverprofile=coverage.out ./...
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.out
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@v2.25.0
      - name: Run gosec
        run: gosec -exclude=G104,G107,G117,G204,G304,G122,G118 ./...

  sandbox-image:
    name: Sandbox image smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sandbox image
        run: docker build -f deploy/docker/Dockerfile.sandbox -t skillbox-sandbox:ci .
      - name: Verify expected CLI tools present
        # Pinned tools agents rely on. Adding a tool to Dockerfile.sandbox?
        # Add its version check here so a future removal trips the build.
        #
        # NOTE: bash with -o pipefail is required. Under plain sh -e, a
        # missing binary on the LHS of a pipe (e.g. `rg --version | head -1`)
        # would exit 127, head would exit 0, and the step would falsely pass.
        run: |
          docker run --rm skillbox-sandbox:ci bash -euo pipefail -c '
            jq --version
            rg --version | head -1
            fd --version
            curl --version | head -1
            uv --version
            python3 --version
          '
