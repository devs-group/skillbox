version: 1

# Block patterns — always reject. Each entry needs: regex, category, description.
block_patterns:
  # Reverse shells
  - regex: '\bnc\s+(-[a-z])*\s*-e\s'
    category: reverse_shell
    description: "netcat reverse shell"
  - regex: '/dev/tcp/'
    category: reverse_shell
    description: "bash reverse shell via /dev/tcp"
  - regex: '\bmkfifo\b.*\bnc\b'
    category: reverse_shell
    description: "named pipe reverse shell"
  - regex: 'bash\s+-i\s+>&\s+/dev/tcp/'
    category: reverse_shell
    description: "interactive bash reverse shell"
  - regex: '\bsocat\b.*\bexec\b'
    category: reverse_shell
    description: "socat reverse shell"
  - regex: '\bpython[23]?\s+-c\s+[''"]import\s+socket'
    category: reverse_shell
    description: "python reverse shell"

  # Piped execution
  - regex: '\bcurl\b[^|]*\|\s*(ba)?sh\b'
    category: piped_execution
    description: "curl piped to shell"
  - regex: '\bwget\b[^|]*\|\s*(ba)?sh\b'
    category: piped_execution
    description: "wget piped to shell"
  - regex: '\bbase64\s+-d\b[^|]*\|\s*(ba)?sh\b'
    category: piped_execution
    description: "base64 decoded and piped to shell"
  - regex: '\bcurl\b[^|]*\|\s*python'
    category: piped_execution
    description: "curl piped to python"
  - regex: '\bwget\b[^|]*\|\s*python'
    category: piped_execution
    description: "wget piped to python"

  # Crypto miners
  - regex: '\bimport\s+(?:hashlib|cryptonight|xmrig|stratum)'
    category: crypto_miner
    description: "crypto mining import"
  - regex: 'stratum\+tcp://'
    category: crypto_miner
    description: "mining pool connection"
  - regex: '\bcoinhive\b'
    category: crypto_miner
    description: "coinhive miner reference"
  - regex: '\bxmr-?stak\b'
    category: crypto_miner
    description: "XMR-Stak miner reference"

  # Sandbox escape attempts
  - regex: '/proc/[0-9]+/ns/'
    category: sandbox_escape
    description: "namespace access attempt"
  - regex: '\bnsenter\b'
    category: sandbox_escape
    description: "nsenter container escape"
  - regex: '\bunshare\b.*--mount'
    category: sandbox_escape
    description: "mount namespace escape"
  - regex: '\bmount\s+-t\s+proc\b'
    category: sandbox_escape
    description: "proc mount attempt"

  # Dangerous system operations
  - regex: '\brm\s+-rf\s+/(?:\s|$)'
    category: destructive_command
    description: "recursive root deletion"
  - regex: ':\(\)\s*\{.*:\|:.*\}\s*;\s*:'
    category: fork_bomb
    description: "fork bomb"

# Common block patterns (cross-language)
common_block_patterns:
  - regex: '[A-Za-z0-9+/=]{256,}'
    category: obfuscation
    description: "large base64-encoded blob"

# Flag patterns — suspicious but possibly legitimate, escalated to deeper tiers.
flag_patterns:
  # Process execution
  - regex: '\bsubprocess\.(?:Popen|call|run|check_output)\b'
    category: process_execution
    description: "python subprocess usage"
  - regex: '\bos\.system\b'
    category: process_execution
    description: "python os.system usage"
  - regex: '\bos\.popen\b'
    category: process_execution
    description: "python os.popen usage"
  - regex: '\bchild_process\b'
    category: process_execution
    description: "node child_process usage"
  - regex: '\bexecSync\b|\bexecFileSync\b|\bspawnSync\b'
    category: process_execution
    description: "node sync process execution"

  # Dynamic code execution
  - regex: '\beval\s*\('
    category: dynamic_execution
    description: "eval() usage"
  - regex: '\bexec\s*\('
    category: dynamic_execution
    description: "exec() usage"
  - regex: '\bFunction\s*\('
    category: dynamic_execution
    description: "Function constructor usage"
  - regex: '\bcompile\s*\('
    category: dynamic_execution
    description: "compile() usage"

  # Network operations
  - regex: '\bsocket\.connect\b'
    category: network_access
    description: "python socket connect"
  - regex: '\bnet\.connect\b'
    category: network_access
    description: "node net connect"
  - regex: '\brequests\.(?:get|post|put|delete|patch)\b'
    category: network_access
    description: "python requests HTTP call"
  - regex: '\burllib\.request\b'
    category: network_access
    description: "python urllib request"

  # File system access patterns
  - regex: '/etc/passwd'
    category: sensitive_file_access
    description: "reading /etc/passwd"
  - regex: '/etc/shadow'
    category: sensitive_file_access
    description: "reading /etc/shadow"
  - regex: '~/.ssh/'
    category: sensitive_file_access
    description: "SSH directory access"
  - regex: '\.env\b'
    category: sensitive_file_access
    description: "environment file access"

# Common flag patterns (cross-language)
common_flag_patterns:
  - regex: '\b(?:(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\b'
    category: hardcoded_ip
    description: "hardcoded IP address"

