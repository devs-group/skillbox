services:
  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: skillbox
      POSTGRES_PASSWORD: skillbox
      POSTGRES_DB: skillbox_test
    ports:
      - "5599:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skillbox -d skillbox_test"]
      interval: 1s
      timeout: 3s
      retries: 30
    tmpfs:
      - /var/lib/postgresql/data
