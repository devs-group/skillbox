# -- Replica count
replicaCount: 2

image:
  repository: ghcr.io/devs-group/skillbox
  tag: ""  # defaults to Chart.appVersion
  pullPolicy: IfNotPresent

# -- PostgreSQL connection string (required)
postgresql:
  dsn: ""

# -- MinIO / S3 connection (required)
# endpoint should be host:port without scheme (e.g. minio:9000)
minio:
  endpoint: ""
  accessKey: ""
  secretKey: ""
  useSSL: false
  bucketSkills: "skills"
  bucketExecutions: "executions"

# -- Redis (optional — system works without it)
redis:
  enabled: false
  url: ""

# -- OpenSandbox connection (required)
opensandbox:
  url: "http://opensandbox:8080"
  apiKey: ""
  expiration: "5m"

# -- Ory Identity & OAuth2 (optional — enables enterprise auth)
ory:
  kratosPublicURL: ""
  kratosAdminURL: ""
  hydraPublicURL: ""
  hydraAdminURL: ""

# -- GitHub marketplace (optional — enables skill discovery from GitHub)
github:
  token: ""

# -- Skillbox runtime settings
config:
  logLevel: "info"
  defaultTimeout: "120s"
  maxTimeout: "10m"
  defaultMemory: "256Mi"
  defaultCPU: "0.5"
  sandboxSessionImage: "ghcr.io/devs-group/skillbox-sandbox:latest"
  imageAllowlist: "ghcr.io/devs-group/skillbox-sandbox:latest,python:3.12-slim,python:3.11-slim,node:20-slim,node:18-slim,bash:5"

# -- API container resources
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: "1"
    memory: 512Mi

# -- Service type
service:
  type: ClusterIP
  httpPort: 80
  grpcPort: 9090
