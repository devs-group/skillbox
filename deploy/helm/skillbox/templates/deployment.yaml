apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "skillbox.fullname" . }}
  labels:
    {{- include "skillbox.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "skillbox.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "skillbox.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "skillbox.fullname" . }}
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 30
      containers:
        # --- Skillbox API Server ---
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
            - containerPort: 9090
              name: grpc
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "skillbox.fullname" . }}
          env:
            - name: SKILLBOX_DB_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ include "skillbox.fullname" . }}
                  key: SKILLBOX_DB_DSN
            - name: SKILLBOX_S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "skillbox.fullname" . }}
                  key: SKILLBOX_S3_ACCESS_KEY
            - name: SKILLBOX_S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "skillbox.fullname" . }}
                  key: SKILLBOX_S3_SECRET_KEY
            - name: SKILLBOX_OPENSANDBOX_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "skillbox.fullname" . }}
                  key: SKILLBOX_OPENSANDBOX_API_KEY
            {{- if .Values.redis.enabled }}
            - name: SKILLBOX_REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "skillbox.fullname" . }}
                  key: SKILLBOX_REDIS_URL
            {{- end }}
            {{- if .Values.github.token }}
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "skillbox.fullname" . }}
                  key: GITHUB_TOKEN
            {{- end }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsUser: 65534
            runAsGroup: 65534
            capabilities:
              drop: ["ALL"]
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          volumeMounts:
            - name: tmp
              mountPath: /tmp

      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 100Mi
