apiVersion: v1
kind: ConfigMap
metadata:
  name: skillbox-config
  namespace: sandbox
data:
  SKILLBOX_API_PORT: "8080"
  SKILLBOX_GRPC_PORT: "9090"
  SKILLBOX_LOG_LEVEL: "info"
  SKILLBOX_DEFAULT_TIMEOUT: "120s"
  SKILLBOX_MAX_TIMEOUT: "10m"
  SKILLBOX_DEFAULT_MEMORY: "256Mi"
  SKILLBOX_DEFAULT_CPU: "0.5"
  SKILLBOX_IMAGE_ALLOWLIST: "python:3.12-slim,python:3.11-slim,node:20-slim,node:18-slim,bash:5"
  SKILLBOX_S3_BUCKET_SKILLS: "skills"
  SKILLBOX_S3_BUCKET_EXECUTIONS: "executions"
  SKILLBOX_OPENSANDBOX_URL: "http://opensandbox:8080"
  SKILLBOX_SANDBOX_EXPIRATION: "5m"
  # Ory Identity & OAuth2 (set when enterprise auth is enabled)
  # SKILLBOX_KRATOS_PUBLIC_URL: "http://kratos:4433"
  # SKILLBOX_KRATOS_ADMIN_URL: "http://kratos:4434"
  # SKILLBOX_HYDRA_PUBLIC_URL: "http://hydra:4444"
  # SKILLBOX_HYDRA_ADMIN_URL: "http://hydra:4445"
