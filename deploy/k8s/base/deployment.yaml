apiVersion: apps/v1
kind: Deployment
metadata:
  name: skillbox-api
  namespace: sandbox
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: skillbox
  template:
    metadata:
      labels:
        app.kubernetes.io/name: skillbox
    spec:
      serviceAccountName: skillbox-api
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 30
      containers:
        # --- Skillbox API Server ---
        - name: api
          image: ghcr.io/devs-group/skillbox:latest
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
            - containerPort: 9090
              name: grpc
              protocol: TCP
          envFrom:
            - configMapRef:
                name: skillbox-config
            - secretRef:
                name: skillbox-secrets
          env:
            - name: SKILLBOX_OPENSANDBOX_API_KEY
              valueFrom:
                secretKeyRef:
                  name: skillbox-secrets
                  key: SKILLBOX_OPENSANDBOX_API_KEY
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsUser: 65534
            runAsGroup: 65534
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          volumeMounts:
            - name: tmp
              mountPath: /tmp

      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 100Mi
