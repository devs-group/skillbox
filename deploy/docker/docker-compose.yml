services:
  # --- Skillbox API Server ---
  api:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    ports:
      - "${SKILLBOX_API_PORT:-8080}:8080"
      - "${SKILLBOX_GRPC_PORT:-9090}:9090"
    environment:
      SKILLBOX_DB_DSN: "postgres://skillbox:skillbox@postgres:5432/skillbox?sslmode=disable"
      SKILLBOX_S3_ENDPOINT: "minio:9000"
      SKILLBOX_S3_ACCESS_KEY: "minioadmin"
      SKILLBOX_S3_SECRET_KEY: "minioadmin"
      SKILLBOX_S3_USE_SSL: "false"
      SKILLBOX_OPENSANDBOX_URL: "http://opensandbox:8080"
      SKILLBOX_OPENSANDBOX_API_KEY: "${OPENSANDBOX_API_KEY:-skillbox-dev-key}"
      SKILLBOX_LOG_LEVEL: "debug"
      SKILLBOX_IMAGE_ALLOWLIST: "python:3.12-slim,python:3.11-slim,node:20-slim,node:18-slim,bash:5"
      SKILLBOX_KRATOS_PUBLIC_URL: "http://kratos:4433"
      SKILLBOX_KRATOS_ADMIN_URL: "http://kratos:4434"
      SKILLBOX_HYDRA_PUBLIC_URL: "http://hydra:4444"
      SKILLBOX_HYDRA_ADMIN_URL: "http://hydra:4445"
      GITHUB_TOKEN: "${GITHUB_TOKEN:-}"
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      opensandbox:
        condition: service_healthy
      kratos:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped

  # --- PostgreSQL ---
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: skillbox
      POSTGRES_PASSWORD: skillbox
      POSTGRES_DB: skillbox
    ports:
      - "${SKILLBOX_PG_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../../scripts/init-ory-databases.sh:/docker-entrypoint-initdb.d/10-init-ory-databases.sh:ro
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skillbox -d skillbox"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # --- MinIO (S3-compatible object storage) ---
  minio:
    image: minio/minio:latest
    ports:
      - "${SKILLBOX_MINIO_PORT:-9000}:9000"
      - "${SKILLBOX_MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - miniodata:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 10s
    command: server /data --console-address ":9001"
    restart: unless-stopped

  # --- MinIO bucket initialization ---
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - backend
    entrypoint: >
      /bin/sh -c "
      mc alias set skillbox http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing skillbox/skills;
      mc mb --ignore-existing skillbox/executions;
      echo 'Buckets created successfully';
      "

  # --- OpenSandbox ---
  opensandbox:
    image: opensandbox/server:latest
    command: ["--config", "/etc/opensandbox/config.toml"]
    ports:
      - "8081:8080"
    environment:
      OPEN_SANDBOX_API_KEY: "${OPENSANDBOX_API_KEY:-skillbox-dev-key}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./opensandbox-config.toml:/etc/opensandbox/config.toml:ro
    networks:
      - backend
      - docker
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/v1/sandboxes')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # --- Ory Kratos (Identity Management) ---
  kratos-migrate:
    image: oryd/kratos:v25.4.0
    command: migrate sql -e --yes
    environment:
      DSN: postgres://skillbox:skillbox@postgres:5432/skillbox_kratos?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend

  kratos:
    image: oryd/kratos:v25.4.0
    command: serve -c /etc/config/kratos/kratos.yml --dev --watch-courier
    ports:
      - "${KRATOS_PUBLIC_PORT:-4433}:4433"  # Public API
      - "${KRATOS_ADMIN_PORT:-4434}:4434"   # Admin API
    environment:
      DSN: postgres://skillbox:skillbox@postgres:5432/skillbox_kratos?sslmode=disable
    volumes:
      - ../../config/ory/kratos.yml:/etc/config/kratos/kratos.yml:ro
      - ../../config/ory/identity.schema.json:/etc/config/kratos/identity.schema.json:ro
    depends_on:
      kratos-migrate:
        condition: service_completed_successfully
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:4433/health/alive || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # --- Ory Hydra (OAuth2 / OIDC) ---
  hydra-migrate:
    image: oryd/hydra:v25.4.0
    command: migrate sql -e --yes
    environment:
      DSN: postgres://skillbox:skillbox@postgres:5432/skillbox_hydra?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend

  hydra:
    image: oryd/hydra:v25.4.0
    command: serve all --dev
    ports:
      - "${HYDRA_PUBLIC_PORT:-4444}:4444"  # Public API (OAuth2)
      - "${HYDRA_ADMIN_PORT:-4445}:4445"   # Admin API
    environment:
      DSN: postgres://skillbox:skillbox@postgres:5432/skillbox_hydra?sslmode=disable
      URLS_SELF_ISSUER: http://localhost:4444
      URLS_LOGIN: http://localhost:3007/auth/login
      URLS_CONSENT: http://localhost:3007/auth/consent
      URLS_LOGOUT: http://localhost:3007/auth/logout
      URLS_DEVICE_VERIFICATION: http://localhost:3007/auth/device
      URLS_DEVICE_SUCCESS: http://localhost:3007/auth/device/success
      SECRETS_SYSTEM: skillbox-hydra-system-secret-change-in-production!
      STRATEGIES_ACCESS_TOKEN: jwt
    depends_on:
      hydra-migrate:
        condition: service_completed_successfully
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:4444/health/alive || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # --- Hydra CLI OAuth2 client registration (one-time init) ---
  hydra-init:
    image: oryd/hydra:v25.4.0
    depends_on:
      hydra:
        condition: service_healthy
    networks:
      - backend
    entrypoint: >
      /bin/sh -c "
      hydra create client --endpoint http://hydra:4445 --name skillbox-cli --grant-type urn:ietf:params:oauth:grant-type:device_code --response-type code --token-endpoint-auth-method none --scope openid,offline_access --format json > /tmp/client.json 2>/dev/null || true;
      echo 'Hydra CLI client registered';
      cat /tmp/client.json 2>/dev/null || echo 'Client may already exist';
      "

  # --- Marketplace UI (Next.js) ---
  marketplace:
    build:
      context: ../../marketplace
      dockerfile: Dockerfile
    ports:
      - "${MARKETPLACE_PORT:-3007}:3007"
    environment:
      NEXT_PUBLIC_KRATOS_URL: http://localhost:4433
      NEXT_PUBLIC_HYDRA_URL: http://localhost:4444
      NEXT_PUBLIC_API_URL: http://localhost:8080
    depends_on:
      kratos:
        condition: service_healthy
      api:
        condition: service_started
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3007 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # --- Mailpit (dev email testing) ---
  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "${MAILPIT_UI_PORT:-8025}:8025"   # Web UI
      - "${MAILPIT_SMTP_PORT:-1025}:1025" # SMTP
    networks:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
  miniodata:

networks:
  backend:
    driver: bridge
  docker:
    driver: bridge
    internal: true
